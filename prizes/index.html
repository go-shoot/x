<title>景品</title>
<script defer src=../include/common.js></script>
<script src="https://aeoq.github.io/diamond-grid.mjs" type="module"></script>
<link rel=stylesheet href=prize.css>

<nav>
    <menu></menu>
    <a href="https://beyblade.takaratomy.co.jp/beyblade-x/news/news_stickerlist.html" title="各款貼紙"></a>
    <form class="LED"></form>
</nav>

<main class="groups">
    <details open>
        <summary><h3>完整陀螺</h3></summary>
        <diamond-grid id="beys" class="loading"></diamond-grid>
    </details>
    <details>
        <summary><h3>單部件</h3></summary>
        <diamond-grid id="parts"></diamond-grid>
    </details>
</main>

<script type="module">
import { Part } from '../parts/part.js'
import { FilterForm, Keihin } from '../include/utilities.js'

const Prize = () => Prize.before().then(Prize.display).then(Prize.after);
Object.assign(Prize, {
    async before () {
        let [beys, keihins] = await Promise.all([DB.get('product', 'beys'), DB.get('product', 'keihins'), DB.get.essentials()]);
        return beys.filter(([, classes]) => classes.includes('Lm'))
            .map(([code, _, bey]) => ({code, bey, ...keihins[code]}))
    },
    display (keihins) {
        Prize.all = keihins.map(k => new Keihin(k));
        let {true: parts, false: beys} = Object.groupBy(Prize.all, k => /^[^ ]$|\//.test(k.title));
        Q('#beys').append(...beys);
        Q('#parts').append(...parts);
    },
    after () {
        Prize.filter();
        Q('nav form').addEventListener('change', () => Prize.all.forEach(article => article.Keihin.fill()), {once: true});
        FilterForm.event(Prize.all);
        Q('#beys').classList.remove('loading');
    },
    filter: () => Q('nav form').append(
        new FilterForm.fieldset(Prize.icons, {name: 'type'}), 
        new FilterForm.fieldset(Prize.lines, {name: 'line', negate: true})
    ),
    icons: new O({'keihin-m': '\ue001', 'keihin-g': '\ue002', 'keihin-d': '\ue02f', 'keihin-t': '\ue031'}),
    lines: LINES.map(([line]) => [line, E('img', {src: `../img/lines.svg#${line}`})]),
});
Q('main').prepend(DB().then(Prize));
</script>
