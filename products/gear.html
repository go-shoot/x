    }

    }
</style>

<nav>

        <li><a href='../products/'>陀螺</a>

<main class=groups>
    <section hidden id=launchers>
        <h1 hidden>發射器</h1>
        <h2>拉線型</h2>

    <section hidden id=others>
        <h1 hidden>用具</h1>
        <h2>手把及輔助</h2>

    </section>
</main>

<template id="winder launcher (+)">
    由最長起排名是：<ul><li><ruby>Long Winder<rt>ロングワインダー</ruby><li><ruby>Dragon Winder<rt>ドラゴンワインダー</ruby></ol>
</template>
<template id="rubber custom grip">
    四塊分別是：<dl><dt><ruby>Rubber Side Panel<rt>ラバーサイドパネル</ruby> L<dd>放四根手指用<dt><ruby>Rubber Side Panel<rt>ラバーサイドパネル</ruby> M<dd>容易握的平坦形<dt><ruby>Rubber Side Panel<rt>ラバーサイドパネル</ruby> S<dd>放姆指用<dt><ruby>Rubber Grip Panel<rt>ラバーグリップパネル</ruby><dd>一端的突起減少滑手</dl>
</template>
<template id="custom grip">
    四塊分別是：<dl><dt><ruby>Long Side Panel<rt>ロングサイドパネル</ruby><dd>放四根手指用<dt><ruby>Grip Panel<rt>グリップパネル</ruby><dd>掌心用的平坦形<dt><ruby>Short Side Panel<rt>ショートサイドパネル</ruby><dd>放姆指用<dt><ruby>Hybrid Panel<rt>ハイグリップパネル</ruby><dd>一端的突起減少滑手</dl>
</template>
<template id="xtreme stadium">
    下方兩側為2分 <ruby>Over Zone<rt>オーバーゾーン</rt></ruby>，中間為3分 <ruby>Xtreme Zone<rt>エクストリームゾーン</rt></ruby>。只要陀螺從洞口離開，不論主動或被動，並沒有再<ruby>返回對戰盤<rt>Reverse</rt></ruby>，對手即可得分。
</template>
<template id="wide xtreme stadium">
    上方兩個角落為3分Xtreme Zone，下方中間為2分Over Zone。最後一顆生存的陀螺為勝，依其餘兩顆如何落敗而加總得分。例如兩顆陀螺分別從2分區及3分區離開對戰盤，剩餘的一顆就取得5分。
</template>


<script type="module">
import DB from '../include/DB.js';
import {Bey, Preview} from '../parts/bey.js';
import {FilterForm, Markup} from '../include/utilities.js';

const Filter = new FilterForm.fieldset(new O({'l':'', 'r':''}));
Q('nav form').append(Filter);

class Group {
    constructor({eng, jap, desc, colors}) {
        let img = new Board(colors[1] || colors[0]).Q('img');
        let details = E('details', [
            E('summary', [
                E('h3', `${jap}${String.fromCharCode(10)}${eng}`),
                E('small', desc),
                E('picture', {style: {
                    background: `url(${img.src}) center / ${img.style.width || (img.style || 150) + '%'}`
                }})
            ], {id: eng}),
            E('p', [Q(`[id='${eng}']`)?.content ?? '']),
            E('ol.boards')
        ]);
        details.Q('summary').addEventListener('click', async () => {
            let beys = await DB.get('product', 'beys');
            details.Q('ol').append(...colors.map(item => new Board(item,              
                /BX[CH]/.test(item[0]) ? 'Lm' :
                beys.find(([code]) => code.includes(item[0].split(' ')[0]))?.[1].split(' ')[0] ?? 'B'
            )));
            FilterForm.event(Q('.boards li'));
            document.forms[0].onreset();
        }, {once: true});
        return details;
    }
    static location = {
        launchers: eng => eng.includes('string') ? 1 : 2,
        others: eng => eng.includes('stadium') ? 2 : 1
    }
}
class Board {
    constructor(content, type = '') {
        content = [...content]; //preview popped
        let img = typeof content.at(-1) == 'object' ? content.pop() : [];
        let {true: src, false: style} = Object.groupBy(img, c => typeof c == 'string');
        [src, style] = [src?.[0], style?.[0]];
        let [code, classes] = content;
        return E('li', [
            E('div', ...code.split(' ').flatMap(c => [E('code', Markup.nobreak(c)), ' '])),
            E('figure>img', {
                src: this.src(code, src), alt: code, loading: 'lazy',
                style: typeof style == 'object' ? style : {width: (style || 150) + '%'}
            }),
            ...classes?.split(' ').map(c => Board.winder[c]?.cloneNode(true) ?? '') ?? []
        ], {classList: classes + (type ? ' ' + type : '')});
    }
    src = (code, src) => {
        src = !src || /^\d/.test(src) ? 
            code.split(' ')[0].replace('-', '') + (src ? `_${src.padStart(2, '0')}` : '') + '@1' : src;
        return /^[A-Z]X[A-Z]?\d/i.test(src) ? 
            `//beyblade.takaratomy.co.jp/beyblade-x/lineup/_image/${src}.png` : src;
    }
    static winder = {
        dragon: E('b', 'DRAGON'),
        long: E('b', 'LONG')
    }
}
Q('main').prepend(DB().then(() => {
    DB.get('meta', 'parts').then(meta => Bey.import(meta.general)); //for preview
    let place = Q(`#${location.search.substring(1)}`);
    place.hidden = false;
    Filter.hidden = place.id == 'others';
    DB.get('product', place.id).then(items => {
        items.reverse().forEach(({eng, ...rest}) => 
            place.Q(`h2:nth-of-type(${Group.location[place.id](eng)})`).after(new Group({eng, ...rest}))
        );
        (onhashchange = () => Q('summary', summary => 
            summary.id == decodeURI(location.hash.substring(1)) && [summary.click(), summary.scrollIntoView()]
        ))();
    });
    Q('main').onclick = ev => ev.target.tagName == 'CODE' ? 
        ev.target.closest('li.Lm') ? 
            window.open(ev.target.closest('li').Q('img').src) : 
            new Preview('image', {code: ev.target.innerText}, ev) 
        : '';
}));
</script>
