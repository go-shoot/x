<style>
    textarea {width: 40em; height: 10em;}
    pre {text-align: left;}
</style>

<form>
    <textarea id="news"></textarea>
    <pre>UX-20 starter
グローリーワルキューレLF|Glory Valkyrie LF|att
desc1|desc2</pre>
    <textarea id="part"></textarea>
    <pre>SgSp|hasbro
ジークスペリオン|SiegSuperion
bal|right
34+,22,4
desc</pre>
    <pre id="output"></pre>
</form>

<script type="module">
    document.forms[0].oninput = ev => {
        let result;
        if (ev.target.id == 'news') {
            let [code, name, desc] = ev.target.value.split('\n'), type, name1, name2, bey;
            name && /[ア-ン]|[a-z]{4,}/.test(name) ? [name1, name2, type] = name.split('|') : bey = name;
            desc = desc?.split('|');
            result = {
                code, bey, name: name1 ? [name1, name2].filter(n => n) : null, type, desc
            };
        } else if (ev.target.id == 'part') {
            let [abbr, names, attr, stat, desc] = ev.target.value.split('\n'), group;
            [abbr, group] = abbr.split('|');
            names = Object.fromEntries(names.split('|').map(n => [/[ア-ン]/.test(n) ? 'jap' : 'eng', n]));
            attr = attr?.split('|').filter(v => v);
            stat = stat?.split(',').map(s => /^\d+$/.test(s) ? parseInt(s) : s).filter(v => v);
            result = {[abbr]: {group, names, attr, stat, desc}};
        }
        Q('#output').innerText = JSON.stringify(result, (k, v) => v || undefined, 4).replace(/^\{|\}$/g, '');
    }
    Q('#output').onclick = ev => navigator.clipboard.writeText(ev.target.innerText);
</script>
