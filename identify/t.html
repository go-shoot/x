<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCV.js Multi-Scale Template Matching Demo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f7;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #111; }
        .status {
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .loading { background-color: #ffeeba; color: #856404; }
        .ready { background-color: #d4edda; color: #155724; }
        .upload-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .upload-box {
            border: 2px dashed #ccc;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            background: #fafafa;
        }
        input[type="file"] { margin-top: 10px; }
        button {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        button:hover:not(:disabled) { background-color: #0056b3; }
        .results-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }
        .canvas-container {
            text-align: center;
            background: #eaeaea;
            padding: 10px;
            border-radius: 8px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas { max-width: 100%; height: auto; border-radius: 4px; }
        .rank-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .rank-item {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
        }
        .rank-number {
            font-weight: bold;
            color: #007aff;
            font-size: 14px;
            text-transform: uppercase;
        }
        .rank-details {
            font-size: 14px;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Multi-Scale Template Matching</h1>
    <div id="statusCanvas" class="status loading">Loading OpenCV.js... Please wait.</div>

    <div class="upload-section">
        <div class="upload-box">
            <h3>1. Base Image</h3>
            <input type="file" id="baseImageInput" accept="image/*" disabled>
        </div>
        <div class="upload-box">
            <h3>2. Template Folder</h3>
            <input type="file" id="templateFolderInput" webkitdirectory directory multiple disabled>
            <small style="display:block; margin-top:5px; color:#666;">Select a folder containing template images</small>
        </div>
    </div>

    <button id="processBtn" disabled>Find Best Matches</button>

    <div class="results-container">
        <div>
            <h3>Visualized Results (Top 5)</h3>
            <div class="canvas-container">
                <canvas id="outputCanvas"></canvas>
            </div>
        </div>
        <div>
            <h3>Top 5 Rankings</h3>
            <ul id="rankList" class="rank-list">
                <li style="color: #888; font-style: italic;">No results yet. Upload images and click match.</li>
            </ul>
        </div>
    </div>
</div>

<script async src="https://docs.opencv.org/4.10.0/opencv.js" type="text/javascript" id="opencv-script"></script>

<script>
    const statusCanvas = document.getElementById('statusCanvas');
    const baseImageInput = document.getElementById('baseImageInput');
    const templateFolderInput = document.getElementById('templateFolderInput');
    const processBtn = document.getElementById('processBtn');
    const outputCanvas = document.getElementById('outputCanvas');
    const rankList = document.getElementById('rankList');

    let baseImageSrc = null;
    let templateFiles = [];

    // Colors to draw bounding boxes for top 5 (RGB)
    const rankColors = [
        [255, 0, 0, 255],     // 1st: Red
        [0, 255, 0, 255],     // 2nd: Green
        [0, 0, 255, 255],     // 3rd: Blue
        [255, 165, 0, 255],   // 4th: Orange
        [255, 0, 255, 255]    // 5th: Magenta
    ];

    // Triggered when OpenCV.js is fully loaded
    window.onOpenCvReady = () => {
        statusCanvas.innerText = "OpenCV.js is ready!";
        statusCanvas.className = "status ready";
        baseImageInput.disabled = false;
        templateFolderInput.disabled = false;
    };

    // Check periodically if opencv loaded successfully if onload hook wasn't triggered natively
    const checkCV = setInterval(() => {
        if (typeof cv !== 'undefined' && cv.Mat) {
            clearInterval(checkCV);
            window.onOpenCvReady();
        }
    }, 500);

    // Handle Base Image Upload
    baseImageInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                // Draw initial image to canvas
                outputCanvas.width = img.width;
                outputCanvas.height = img.height;
                const ctx = outputCanvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                baseImageSrc = img;
                checkReadyToProcess();
            };
            img.src = event.target.value || event.target.result;
        };
        reader.readAsDataURL(file);
    });

    // Handle Template Folder Upload
    templateFolderInput.addEventListener('change', (e) => {
        // Filter out non-images (like system files or hidden folders)
        templateFiles = Array.from(e.target.files).filter(file => file.type.startsWith('image/'));
        checkReadyToProcess();
    });

    function checkReadyToProcess() {
        if (baseImageSrc && templateFiles.length > 0) {
            processBtn.disabled = false;
        }
    }

    // Main processing logic
// ... (Keep the rest of your HTML/CSS and setup the same) ...

processBtn.addEventListener('click', async () => {
    processBtn.disabled = true;
    statusCanvas.innerText = "Processing multiple instances... Please wait.";
    statusCanvas.className = "status loading";

    await new Promise(r => setTimeout(r, 50));

    try {
        let src = cv.imread(outputCanvas);
        let srcGray = new cv.Mat();
        cv.cvtColor(src, srcGray, cv.COLOR_RGBA2GRAY);

        let allCandidates = [];
        const THRESHOLD = 0.80; // Only accept matches that are 80% similar or higher

        for (let file of templateFiles) {
            let templateImg = await loadImageAsync(file);
            let tempMat = cv.imread(templateImg);
            let tempGray = new cv.Mat();
            cv.cvtColor(tempMat, tempGray, cv.COLOR_RGBA2GRAY);

            const scales = [.5,.6,0.7, 0.8, 0.9, 1.0]; // Scale range

            for (let scale of scales) {
                let width = Math.round(tempGray.cols * scale);
                let height = Math.round(tempGray.rows * scale);

                if (width > srcGray.cols || height > srcGray.rows || width < 10 || height < 10) continue;

                let resizedTemplate = new cv.Mat();
                let dsize = new cv.Size(width, height);
                cv.resize(tempGray, resizedTemplate, dsize, 0, 0, cv.INTER_LINEAR);

                let resultMat = new cv.Mat();
                cv.matchTemplate(srcGray, resizedTemplate, resultMat, cv.TM_CCOEFF_NORMED);
                
                // --- LOOP THROUGH ALL PIXELS INSTEAD OF USING minMaxLoc ---
                let data = resultMat.data32F; // Access raw float data of the match matrix
                for (let row = 0; row < resultMat.rows; row++) {
                    for (let col = 0; col < resultMat.cols; col++) {
                        let score = data[row * resultMat.cols + col];
                        
                        if (score >= THRESHOLD) {
                            allCandidates.push({
                                fileName: file.name,
                                score: score,
                                scale: scale,
                                x: col,
                                y: row,
                                width: width,
                                height: height
                            });
                        }
                    }
                }

                resizedTemplate.delete();
                resultMat.delete();
            }
            tempMat.delete();
            tempGray.delete();
        }

        // Sort candidates by score descending
        allCandidates.sort((a, b) => b.score - a.score);

        // --- NON-MAXIMUM SUPPRESSION (NMS) ---
        // Groups close/overlapping boxes together so we don't get 50 boxes on 1 object
        let finalMatches = [];
        const IOU_THRESHOLD = 0.3; // Overlap allowance (30%)

        for (let candidate of allCandidates) {
            let keep = true;
            for (let approved of finalMatches) {
                if (calculateIOU(candidate, approved) > IOU_THRESHOLD) {
                    keep = false;
                    break;
                }
            }
            if (keep) {
                finalMatches.push(candidate);
                if (finalMatches.length >= 5) break; // Stop when we hit the top 5 distinct objects
            }
        }

        // Format data to fit original rendering function
        let topMatches = finalMatches.map(m => ({
            fileName: m.fileName,
            score: m.score,
            scale: m.scale,
            pt: { x: m.x, y: m.y },
            width: m.width,
            height: m.height
        }));

        renderResults(src, topMatches);

        src.delete();
        srcGray.delete();
        statusCanvas.innerText = "Matching Complete!";
        statusCanvas.className = "status ready";
    } catch (err) {
        console.error(err);
        statusCanvas.innerText = "Error encountered.";
    }
    processBtn.disabled = false;
});

// Intersection over Union (IOU) helper to determine box overlaps
function calculateIOU(boxA, boxB) {
    let xA = Math.max(boxA.x, boxB.x);
    let yA = Math.max(boxA.y, boxB.y);
    let xB = Math.min(boxA.x + boxA.width, boxB.x + boxB.width);
    let yB = Math.min(boxA.y + boxA.height, boxB.y + boxB.height);

    let interArea = Math.max(0, xB - xA) * Math.max(0, yB - yA);
    if (interArea === 0) return 0;

    let boxAArea = boxA.width * boxA.height;
    let boxBArea = boxB.width * boxB.height;
    
    return interArea / (boxAArea + boxBArea - interArea);
}    // Helper to asynchronously convert file objects to Image Elements
    function loadImageAsync(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    // Render results back onto the Canvas and generate text list
    function renderResults(srcMat, topMatches) {
        rankList.innerHTML = "";

        topMatches.forEach((match, index) => {
            let color = rankColors[index] || [255, 255, 255, 255];
            let cvColor = new cv.Scalar(color[0], color[1], color[2], color[3]);

            // Draw rectangle around detected match zone
            let point1 = new cv.Point(match.pt.x, match.pt.y);
            let point2 = new cv.Point(match.pt.x + match.width, match.pt.y + match.height);
            
            // Thicker lines for higher ranks
            let thickness = 4 - index > 1 ? 4 - index : 2; 
            cv.rectangle(srcMat, point1, point2, cvColor, thickness, cv.LINE_8, 0);

            // Build UI text cards
            let li = document.createElement('li');
            li.className = "rank-item";
            li.style.borderLeft = `6px solid rgb(${color[0]}, ${color[1]}, ${color[2]})`;
            
            li.innerHTML = `
                <div class="rank-number">Rank ${index + 1}</div>
                <div class="rank-details">
                    <strong>File:</strong> ${match.fileName}<br>
                    <strong>Confidence Score:</strong> ${(match.score * 100).toFixed(2)}%<br>
                    <strong>Best Scale Factor:</strong> ${match.scale.toFixed(1)}x<br>
                    <strong>Location:</strong> X: ${match.pt.x}, Y: ${match.pt.y}
                </div>
            `;
            rankList.appendChild(li);
        });

        // Push modified Mat back to HTML canvas view
        cv.imshow(outputCanvas, srcMat);
    }
</script>

</body>
</html>
