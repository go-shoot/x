<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Matching with OPENCV.JS</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f4; }
        h1 { text-align: center; }
        .controls { text-align: center; margin: 20px 0; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        input[type="file"] { margin: 0 10px; }
        .preview { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin: 20px 0; }
        .preview img { max-width: 200px; max-height: 200px; border: 1px solid #ccc; }
        table { width: 100%; max-width: 800px; margin: 20px auto; border-collapse: collapse; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background: #f0f0f0; }
        .result { display: flex; flex-direction: column; align-items: center; }
        .score { font-weight: bold; color: #0066cc; font-size: 1.2em; }
        canvas { border: 1px solid #000; background: #eee; }
        .result canvas {max-width: 500px;}
    </style>
</head>
<body>
    <h1>Template Matching with OpenCV.js</h1>
    <div class="controls">
        <button id="runBtn">Run Template Matching</button>
        <input type="file" id="collageInput" accept="image/*" multiple>
        <label for="collageInput">Upload Collage(s)</label>
        <input type="file" id="templatesInput" accept="image/*" multiple>
        <label for="templatesInput">Upload Templates (PNG with transparency)</label>
        <input type="range" id="scaleSlider" min="0.1" max="1" step="0.05" value="0.5">
        <label>Scale Down Templates: <span id="scaleVal">0.5</span></label>
    </div>

    <div class="preview" id="collagePreview"></div>
    <div class="preview" id="templatePreview"></div>

    <table>
        <thead>
            <tr>
                <th>Template</th>
                <th>Best Match Score</th>
                <th>Position</th>
            </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
    </table>

    <canvas id="canvas" width="800" height="600"></canvas>

    <script src="https://docs.opencv.org/4.x/opencv.js"></script>
    <script>
        let collage = null;
        let templates = [];
        let canvas = null;
        let ctx = null;
        let scale = 0.5;

        const collageInput = document.getElementById('collageInput');
        const templatesInput = document.getElementById('templatesInput');
        const scaleSlider = document.getElementById('scaleSlider');
        const scaleVal = document.getElementById('scaleVal');
        const canvasEl = document.getElementById('canvas');
        const resultsBody = document.getElementById('resultsBody');

        // Update slider value
        scaleSlider.addEventListener('input', () => {
            scale = parseFloat(scaleSlider.value);
            scaleVal.textContent = scale;
        });

        // Create temporary canvas for drawing
        function createCanvas() {
            canvas = document.createElement('canvas');
            canvas.width = 800;
            canvas.height = 600;
            ctx = canvas.getContext('2d');
            return canvas;
        }

        // Clear canvas
        function clearCanvas() {
            if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // Draw image on canvas
        function drawImage(img, x, y, w, h) {
            if (!ctx) return;
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = w;
            tempCanvas.height = h;
            const tctx = tempCanvas.getContext('2d');
            tctx.drawImage(img, 0, 0, w, h);
            ctx.drawImage(tempCanvas, x, y);
        }

        // Load image as HTMLImageElement
        function loadImage(src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => resolve(img);
                img.onerror = reject;
                img.src = src;
            });
        }

        // Create OpenCV.js Mat from HTMLImageElement (with color)
        async function createMatFromImage(img) {
            const width = img.width;
            const height = img.height;
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;

            const mat = cv.Mat.zeros(height, width, cv.CV_8UC4);
            for (let i = 0; i < data.length; i += 4) {
                mat.data[i] = data[i];     // B
                mat.data[i + 1] = data[i + 1]; // G
                mat.data[i + 2] = data[i + 2]; // R
                mat.data[i + 3] = data[i + 3]; // A
            }
            return mat;
        }

        // Convert to grayscale Mat (faster processing)
        async function toGray(mat) {
            const gray = new cv.Mat();
            cv.cvtColor(mat, gray, cv.COLOR_RGBA2GRAY);
            return gray;
        }

        // Resize image using OpenCV (using nearest neighbor for speed)
        async function resizeImage(img, targetW, targetH) {
            const src = await createMatFromImage(img);
            const resized = new cv.Mat();
            cv.resize(src, resized, new cv.Size(targetW, targetH), 0, 0, cv.INTER_NEAREST);
            src.delete();
            return resized;
        }

        // Find best match position and score (grayscale) - FIXED: correct minMaxLoc call (only 1 arg)
        async function findBestMatch(collageGray, templateGray, templateWidth, templateHeight) {
            const result = new cv.Mat();
            cv.matchTemplate(collageGray, templateGray, result, cv.TM_CCOEFF_NORMED);

            // FIXED: minMaxLoc expects exactly 1 argument (the result Mat). Using the full result object is the correct OpenCV.js pattern.
            const minMaxResult = cv.minMaxLoc(result);

            let maxVal = minMaxResult.maxVal;
            let maxLoc = minMaxResult.maxLoc;

            result.delete();

            const score = Math.round(maxVal * 100); // percentage
            const x = Math.round(maxLoc.x);
            const y = Math.round(maxLoc.y);

            return { score, x, y };
        }

        // Draw bounding box around best match
        function drawMatchBox(img, x, y, w, h) {
            let ctx = document.querySelector('.result canvas').getContext('2d');
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 4;
            ctx.strokeRect(x, y, w, h);
        }

        // Render collage preview
        function renderCollagePreview(urls) {
            const previewContainer = document.getElementById('collagePreview');
            previewContainer.innerHTML = '';
            urls.forEach(url => {
                loadImage(url).then(img => {
                    const div = document.createElement('div');
                    div.className = 'result';
                    const smallCanvas = document.createElement('canvas');
                    smallCanvas.width = img.width;
                    smallCanvas.height = img.height;
                    const sctx = smallCanvas.getContext('2d');
                    sctx.drawImage(img, 0, 0, img.width, img.height, 0, 0, img.width, img.height);
                    div.appendChild(smallCanvas);
                    previewContainer.appendChild(div);
                });
            });
        }

        // Render templates preview
        function renderTemplatePreview(urls) {
            const previewContainer = document.getElementById('templatePreview');
            previewContainer.innerHTML = '';
            urls.forEach(url => {
                loadImage(url).then(img => {
                    const div = document.createElement('div');
                    div.className = 'result';
                    const smallCanvas = document.createElement('canvas');
                    smallCanvas.width = 100;
                    smallCanvas.height = 100;
                    const sctx = smallCanvas.getContext('2d');
                    sctx.drawImage(img, 0, 0, img.width, img.height, 0, 0, 100, 100);
                    div.appendChild(smallCanvas);
                    previewContainer.appendChild(div);
                });
            });
        }

        // Clear results table
        function clearResultsTable() {
            resultsBody.innerHTML = '';
        }

        // Add row to results table
        function addResultRow(templateName, score, x, y, width, height) {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${templateName}</td>
                <td>${score}%</td>
                <td>(${x}, ${y})</td>
            `;
            resultsBody.appendChild(row);
        }

        // Main processing function
        async function runTemplateMatching() {
            clearCanvas();
            clearResultsTable();
            const collageUrls = collageInput.files ? Array.from(collageInput.files).map(f => URL.createObjectURL(f)) : [];
            const templateUrls = templatesInput.files ? Array.from(templatesInput.files).map(f => URL.createObjectURL(f)) : [];

            if (collageUrls.length === 0 || templateUrls.length === 0) {
                alert('Please upload at least one collage and one template (PNG recommended).');
                return;
            }

            createCanvas();
            renderCollagePreview(collageUrls);
            renderTemplatePreview(templateUrls);

            // Load all templates once
            const templateImages = [];
            for (let url of templateUrls) {
                try {
                    const img = await loadImage(url);
                    templateImages.push(img);
                } catch (e) {
                    console.error('Failed to load template:', url);
                }
            }

            // Process each collage
            let collageImg = await loadImage(collageUrls[0]);
            collage = await createMatFromImage(collageImg);
            let collageGray = await toGray(collage);

            for (let url of collageUrls) {
                try {

                    // Draw original collage on canvas
                    ctx.drawImage(collageImg, 0, 0);

                    // Process each template
                    for (let i = 0; i < templateImages.length; i++) {
                        const templateImg = templateImages[i];

                        // Calculate scaled dimensions
                        const scaledW = Math.round(templateImg.width * scale);
                        const scaledH = Math.round(templateImg.height * scale);

                        // Resize template
                        const scaledMat = await resizeImage(templateImg, scaledW, scaledH);
                        const scaledGray = await toGray(scaledMat);
                        const templateWidth = scaledW;
                        const templateHeight = scaledH;

                        // Convert collage to grayscale once (shared)
                            // Perform matching
                            const result = await findBestMatch(collageGray, scaledGray, templateWidth, templateHeight);

                            const score = result.score;
                            const x = result.x;
                            const y = result.y;

                            // Draw bounding box
                            drawMatchBox(collageImg, x, y, templateWidth, templateHeight);

                            // Update table
                            addResultRow(`Template ${i + 1}`, score, x, y, templateWidth, templateHeight);

                        scaledGray.delete();

                        scaledMat.delete();
                    }
                } catch (e) {
                    console.error('Processing error:', e);
                }
            }

            // Re-draw the collage with boxes on the final canvas
            if (collageImg) {
                ctx.drawImage(collageImg, 0, 0);
            }
        }

        // Event listeners
        document.getElementById('runBtn').addEventListener('click', runTemplateMatching);

        // Cleanup URLs when files change
        collageInput.addEventListener('change', () => {
            clearCanvas();
            clearResultsTable();
        });
        templatesInput.addEventListener('change', () => {
            clearCanvas();
            clearResultsTable();
        });
    </script>
</body>
</html>
