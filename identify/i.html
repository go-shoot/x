<title>Identify</title>
<script defer src="../include/common.js"></script>
<script type="module" src="https://aeoq.github.io/drag-knob/script.js"></script>
<link rel="stylesheet" href="index.css">

<nav>
    <menu></menu>
    <fieldset class="LED">
        <label>港<input name=lang type=radio value=hk></label>
        <label>台<input name=lang type=radio value=tw></label>
    </fieldset>
    <form>
        <div>
            <button data-url="https://i.imgur.com/rSYdB86.jpeg" data-comp="bit" data-controls='{"luma_min":15,"luma_max":100,"chroma":13,"buffer":1,"side_min":3,"side_max":50}'>示例1</button>
            <button data-url="https://i.imgur.com/h2gxl9t.jpeg" data-comp="ratchet" data-controls='{"luma_min":10,"luma_max":145,"chroma":8,"buffer":2,"side_min":5,"side_max":50}'>示例2</button>
        </div>
    </form>
</nav>
<main style="user-select: none;">
    <details class="tool">
        <summary class="loading">提示</summary>
        <ul class="default">
            <li>此工具目前與本站［部件］的圖片進行配對，故只支援以官方圖片製成的組圖，如Tier list。請透過［示例］了解</li>
            <li>最好使用性能較好的設備！</li>
        </ul>
    </details>
    <ol>
        <li>STEP 1：<label>&#xe03f; 上載<input type="file" accept="image/*"></label></li>
        <li class="inactive" id="step-2">STEP 2：<label>拖上／下旋鈕以調節敏感度</label></li>
        <li class="inactive" id="step-3" style="--p:0">STEP 3：選擇要辦認的部件
            <fieldset class="LED"> 
                <label class="icon-blade">
                    <input type="radio" name="comp" value="CX" disabled>
                    <img src="../img/lines.svg#CX">
                </label>
                <label class="icon-blade">
                    <input type="radio" name="comp" value="blade" disabled>
                    <div><img src="../img/lines.svg#BX"><img src="../img/lines.svg#UX"></div></label>
                <label class="icon-ratchet">
                    <input type="radio" name="comp" value="ratchet">
                </label>
                <label class="icon-bit">
                    <input type="radio" name="comp" value="bit">
                </label>
            </fieldset>
            <span>調整資源圖片背景色中</span>
        </li>
        <li class="inactive">
            STEP 4：<button id="match" class="text">配對</button>
        </li>
        <li class="inactive" id="step-5">
            STEP 5：在圖上點擊以進行
            <fieldset class="LED">
                <label>預覽<input name=mode type=radio value=preview checked></label>或    
                <label>修正<input name=mode type=radio value=amend></label>
            </fieldset>
        </li>
        <li class="inactive">
            STEP 6：
            <button id="download" class="text">下載</button>或
            <button id="tier" class="text">加至我的Tier list</button>
            <textarea></textarea>
        </li>
    </ol>
    <div>
        <button name="mag" value="-">&#xe00c;</button><button name="mag" value="+">&#xe00b;</button>
    </div>
    <div style="--f:1">
        <canvas></canvas>
    </div>
</main>
<aside id="controls">
    <continuous-knob title="亮度下限" id="luma_min" min="1" max="100" value="2"><i class="center"></i></continuous-knob>
    <continuous-knob title="亮度上限" id="luma_max" min="50" max="200" value="100"><i class="center"></i></continuous-knob>
    <continuous-knob title="色度下限" id="chroma" min="1" max="50" value="30" step="1"><i class="center"></i></continuous-knob>
    <continuous-knob title="Buffer" id="buffer" min="0" max="3" value="1" step="1"><i class="center"></i></continuous-knob>
    <continuous-knob title="邊長下限" id="side_min" min="0" max="80" value="3" unit="%"><i class="center"></i></continuous-knob>
    <continuous-knob title="邊長上限" id="side_max" min="20" max="100" value="50" unit="%"><i class="center"></i></continuous-knob>
</aside>
<aside id="correct"></aside>

<script type="module">
    import DB from '../include/DB.js';
    import App from './i.js';
    Q('main').after(DB().then(App));
</script>
<link rel="stylesheet" href="../parts/part.css">
<link rel="stylesheet" href="../prizes/prize.css">
