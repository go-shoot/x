<title>辨認器</title>
<script defer src="../include/common.js"></script>
<script type="module" src="https://aeoq.github.io/drag-knob/script.js"></script>
<link rel="stylesheet" href="index.css">

<nav>
    <menu>
        <li><a href='/x/customize/garage.html'></a>
    </menu>
    <fieldset class="LED">
        <label>港<input name=lang type=radio value=hk></label>
        <label>台<input name=lang type=radio value=tw></label>
    </fieldset>
    <form>
        <div>
            <button data-url="https://i.imgur.com/Md3Q87k.jpeg">示例1</button>
            <button data-url="https://i.imgur.com/o4z2EBr.jpeg">示例2</button>
        </div>
    </form>
</nav>
<main>
    <details class="tool">
        <summary class="loading">提示</summary>
        <ul class="default">
            <li>此工具目前與本站［部件］的圖片進行配對，故只支援以官方圖片製成的組圖，如Tier list。請透過［示例］了解</li>
            <li>最好使用性能較好的設備！</li>
        </ul>
    </details>
    <ol>
        <li>STEP 1：<label>&#xe03f; 上載<input type="file" accept="image/*"></label></li>
        <li class="inactive" id="step-2">
            STEP 2：探測
            <fieldset class="LED">
                <label>AI模型<input name="detect" type="radio" value="AI" checked></label>
                <label>手動<input name="detect" type="radio" value="manual"></label>
            </fieldset>
            <fieldset class="LED inactive" id="comp"> 
                <label class="icon-blade">
                    <input type="radio" name="comp" value="CX" disabled="">
                    <img src="../img/lines.svg#CX">
                </label>
                <label class="icon-blade">
                    <input type="radio" name="comp" value="blade" disabled="">
                    <div><img src="../img/lines.svg#BX"><img src="../img/lines.svg#UX"></div></label>
                <label class="icon-ratchet">
                    <input type="radio" name="comp" value="ratchet">
                </label>
                <label class="icon-bit">
                    <input type="radio" name="comp" value="bit">
                </label>
            </fieldset>
        </li>
        <li class="inactive" style="--p:0">STEP 3：調整比對圖片背景色</li>
        <li class="inactive">STEP 4：配對
            <fieldset class="LED" hidden>
                <label>phash<input name=algo type=radio value=phash checked></label>
                <label>ahash<input name=algo type=radio value=ahash></label>
                <label>dhash<input name=algo type=radio value=dhash></label>
                <label>whash<input name=algo type=radio value=whash></label>
                <label>crhash<input name=algo type=radio value=cropResistantHash></label>
            </fieldset>
        </li>
        <li class="inactive" id="step-5">
            STEP 5：在圖上點擊以進行
            <fieldset class="LED">
                <label>預覽<input name=mode type=radio value=preview checked></label>或    
                <label>修正<input name=mode type=radio value=correct></label>
            </fieldset>
        </li>
        <li class="inactive">
            STEP 6：
            <button id="download" class="text">下載</button>或　加至我的Tier list：
            <div id="tier"></div>
            <small>加入後可在［存庫］查看。如該部件已被評價，將會取代<button id="tier-confirm" class="text">確認</button></small>
        </li>
    </ol>
    <div>
        <button name="mag" value="-">&#xe00c;</button><button name="mag" value="+">&#xe00b;</button>
    </div>
    <div style="--f:1">
        <canvas></canvas>
    </div>
</main>
<aside id="controls">
    <continuous-knob title="亮度下限" id="luma_min" min="1" max="100" value="2"><i class="center">&#xe028;</i></continuous-knob>
    <continuous-knob title="亮度上限" id="luma_max" min="50" max="200" value="100"><i class="center">&#xe028;</i></continuous-knob>
    <continuous-knob title="色度下限" id="chroma" min="1" max="50" value="30" step="1"><i class="center">&#xe028;</i></continuous-knob>
    <continuous-knob title="Buffer" id="buffer" min="0" max="3" value="1" step="1"><i class="center">&#xe028;</i></continuous-knob>
    <continuous-knob title="邊長下限" id="side_min" min="0" max="80" value="3" unit="%"><i class="center"></i></continuous-knob>
    <continuous-knob title="邊長上限" id="side_max" min="20" max="100" value="50" unit="%"><i class="center"></i></continuous-knob>
</aside>
<aside id="correct"></aside>

<script type="module">
    import DB from '../include/DB.js';
    import App from './index.js';
    Q('main').after(DB().then(App));
</script>
<link rel="stylesheet" href="../parts/part.css">
<link rel="stylesheet" href="../prizes/prize.css">
