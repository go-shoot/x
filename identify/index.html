<title>Identify</title>
<script defer src="../include/common.js"></script>
<script type="module" src="https://aeoq.github.io/drag-knob/script.js"></script>
<link rel="stylesheet" href="index.css">

<nav>
    <menu></menu>
    <fieldset class="LED">
        <label>修正<input name=mode type=radio value=amend checked></label>
        <label>預覽<input name=mode type=radio value=preview></label>
    </fieldset>
    <form>
        <div>
            <button id="download">&#xe03e; 下載</button>
        </div>
        <div>
            <button data-url="https://i.imgur.com/rSYdB86.jpeg" data-comp="bit" data-luma_min="13">示例1</button>
            <button data-url="https://i.imgur.com/h2gxl9t.jpeg" data-comp="ratchet" data-luma_min="10" data-chroma="5" data-side_min="5">示例2</button>
            <button>示例3</button>
        </div>
    </form>
</nav>
<main style="user-select: none;">
    <details>
        <summary class="loading">提示</summary>
        <ul class="default">
            <li>此工具目前只支援以官方圖片製成的組圖，如Tier list。請透過［示例］了解</li>
        </ul>
    </details>
    <ol>
        <li>STEP 1：<label>&#xe010; &#xe03f; 上載<input type="file" accept="image/*"> &#xe00f;</label></li>
        <li class="inactive" id="select">STEP 2：選擇要辦認的部件
            <fieldset class="LED">&#xe010; 
                <label class="icon-blade">
                    <input type="radio" name="comp" value="CX">
                    <img src="../img/lines.svg#CX">
                </label>
                <label class="icon-blade">
                    <input type="radio" name="comp" value="blade">
                    <div><img src="../img/lines.svg#BX"><img src="../img/lines.svg#UX"></div></label>
                <label class="icon-ratchet">
                    <input type="radio" name="comp" value="ratchet">
                </label>
                <label class="icon-bit">
                    <input type="radio" name="comp" value="bit">
                </label>
            &#xe00f;</fieldset>
            <p>調整資源圖片背景色中...</p>
        </li>
        <li class="inactive" id="adjust">STEP 3：<label>&#xe010; 拖上／下旋鈕以調節敏感度 &#xe00f;</label></li>
        <li class="inactive" id="execute">
            STEP 4：<button id="match">&#xe010; 配對 &#xe00f;</button>
            <p>配對中...</p>
        </li>
    </ol>
    <div>
        <button name="mag" value="-">&#xe00c;</button><button name="mag" value="+">&#xe00b;</button>
    </div>
    <div style="--f:1">
        <canvas></canvas>
    </div>
</main>
<aside id="controls">
    <continuous-knob title="亮度下限" id="luma_min" min="1" max="100" value="2"><i class="center"></i></continuous-knob>
    <continuous-knob title="亮度上限" id="luma_max" min="50" max="200" value="100"><i class="center"></i></continuous-knob>
    <continuous-knob title="色度下限" id="chroma" min="0" max="50" value="30" step="1"><i class="center"></i></continuous-knob>
    <continuous-knob title="Buffer" id="buffer" min="0" max="3" value="1" step="1"><i class="center"></i></continuous-knob>
    <continuous-knob title="邊長下限" id="side_min" min="0" max="80" value="2" unit="%"><i class="center"></i></continuous-knob>
    <continuous-knob title="邊長上限" id="side_max" min="20" max="100" value="50" unit="%"><i class="center"></i></continuous-knob>
</aside>

<script type="module">
    import DB from '../include/DB.js';
    import App from './index.js';
    Q('main').after(DB().then(App));
</script>
