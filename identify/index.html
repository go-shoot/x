<title>Identify</title>
<script defer src=../include/common.js></script>
<script type=module src=https://aeoq.github.io/drag-knob/script.js></script>
<script src="https://docs.opencv.org/4.5.4/opencv.js"></script>
<link rel="stylesheet" href="index.css">

<nav>
    <menu></menu>
    <label>UPLOAD<input type="file" accept="image/*"></label>
    <label><input type="color" value="#FFFFFF"></label>
</nav>
<main style="user-select: none;">
    <p class="loading">AI</p>
    <continuous-knob id="luma_min" min="0" max="100" value="2"></continuous-knob>
    <continuous-knob id="luma_max" min="100" max="200" value="100"></continuous-knob>
    <continuous-knob id="chroma" min="0" max="100" value="30"></continuous-knob>
    <continuous-knob id="extend" min="0" max="10" value="4" step="1"></continuous-knob>
    <button id="match">MATCH</button>
    <button id="snap">SNAP</button>
    <canvas style="max-width:500px"></canvas>
</main>

<script type="module">
    import DB from '../include/DB.js';
    import App from './index.js';
    Q('main').after(DB().then(App));
</script>
